<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動物園訂票系統</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌿 訂票系統正在努力為你服務中 🐵</h1>

<div id="main">

    <!-- 左：注意事項 -->
    <div id="left">
        <h3 id="noticeTitle">⚠ 小提醒</h3>
        <div id="notice">
            • 已成功送出訂票資料，請安心等待處理<br>
            • 在付款完成前不會進行扣款，請放心<br>
            • 若等待時間稍長，可重新整理頁面再試一次
        </div>
    </div>

    <!-- 右：等待區 -->
    <div id="right">

        <div id="message">
            目前有許多使用者正在同時訂票 🐾<br>
            小猴子正在努力幫你處理訂單，請稍候一下～
        </div>

        <div id="progressBar">
            <div id="progress"></div>
            <div id="monkey">🐒</div>
            <div id="endApple">🍎</div>
            <div id="endSweetPotato">🍠</div>
        </div>

        <div id="status">
            <span>進度：</span>
            <span id="percent">0%</span>
        </div>

        <button type="button" onclick="location.reload()" aria-label="重新整理頁面">
            🔄 重新整理
        </button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
