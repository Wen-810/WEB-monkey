<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動物園訂票系統</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>系統載入中，請稍候...</p>
    </div>
</div>

<h1>🌿 訂票系統正在努力為你服務中 🐵</h1>

<div id="main">

    <div id="left">
        <h3 id="noticeTitle">⚠ 小提醒</h3>
        <div id="notice">
            • 訂單正在排隊中，請勿關閉或重新整理頁面  <br>
            • 若長時間未完成，可稍後重新整理頁面再試一次  <br>
            • 入園時請出示有效票券或 QR Code 供查驗    
        </div>
    </div>

    <div id="right">

        <div id="message">
            目前有許多使用者正在同時訂票 🐾<br>
            小猴子正在努力幫你處理訂單，請稍候一下～
        </div>


        <div id="queue">
            目前排隊人數：<span id="queueCount">70</span> 人
        </div>

        <div id="progressBar">
            <div id="progress"></div>
            <div id="monkey">🐒</div>
            <div id="endApple">🍎</div>
            <div id="endSweetPotato">🍠</div>
        </div>

        <div id="status">
            <span>進度：</span>
            <span id="percent">0%</span>
        </div>

        <button type="button" onclick="location.reload()" aria-label="重新整理頁面">
            🔄 重新整理
        </button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
